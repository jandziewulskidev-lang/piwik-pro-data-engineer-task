version: 2

models:
  - name: project_staffing
    description: |
      Aggregated project staffing. Contains project code and name, team size (active employees only), and total weekly hours allocated to active employees. Projects are included even if no active employees are assigned.
    columns:
      - name: project_code
        description: Unique code identifying the project.
      - name: project_name
        description: Human-readable name of the project.
      - name: team_size
        description: Number of active employees assigned to the project.
      - name: total_weekly_hours
        description: Total weekly hours allocated to active employees for the project.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments: [project_code, project_name]
      - not_null:
          column_name: project_code
      - not_null:
          column_name: project_name
      - dbt_utils.expression_is_true:
          arguments:
            expression: 'team_size >= 0'
